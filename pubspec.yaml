name: event_frame
description: "EventFrame — Photographer Client Portal. Secure photo gallery delivery with Google Drive integration."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase (Backend)
  supabase_flutter: ^2.8.0

  # RevenueCat (Subscriptions)
  purchases_flutter: ^8.1.0
  purchases_ui_flutter: ^8.1.0

  # Google Auth & Drive
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Routing & Navigation
  go_router: ^14.2.7

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  app_links: ^6.3.2

  # UI & Media
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Encryption & Security
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0

  # Local Auth (Biometrics)
  local_auth: ^2.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
